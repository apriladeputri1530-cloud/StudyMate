<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Kalender Akademik | StudyMate</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/calendar.css">
</head>

<body>

<div class="mobile-frame">

    <!-- HEADER -->
    <header class="header">

        <h1>Kalender Akademik</h1>

    </header>

    <!-- CALENDAR -->
    <section class="calendar-section">

        <div class="calendar-card">

            <div class="calendar-header">

                <button id="prevMonth" class="month-btn">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>

                <h2 id="monthYear">Juni 2026</h2>

                <button id="nextMonth" class="month-btn">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>

            </div>

            <!-- Nama Hari -->
            <div class="weekdays">

                <span>Min</span>
                <span>Sen</span>
                <span>Sel</span>
                <span>Rab</span>
                <span>Kam</span>
                <span>Jum</span>
                <span>Sab</span>

            </div>

            <!-- Grid Kalender -->
            <div
                id="calendarGrid"
                class="calendar-grid">
            </div>

        </div>

    </section>

    <!-- CONTENT -->
    <main class="content">

        <div class="content-header">

            <h2>Event Mendatang</h2>

            <button class="add-event-btn">

                <i class="fa-solid fa-plus"></i>

                Tambah Event

            </button>

        </div>

        <!-- Legend -->
        <div class="legend">

            <div class="legend-item">
                <span class="legend-dot tugas"></span>
                <span>Tugas</span>
            </div>

            <div class="legend-item">
                <span class="legend-dot ujian"></span>
                <span>Ujian</span>
            </div>

            <div class="legend-item">
                <span class="legend-dot event"></span>
                <span>Event</span>
            </div>

        </div>

        <!-- List Event -->
        <div
            id="eventList"
            class="event-list">

        </div>

        <!-- Empty -->
        <div
            id="emptyState"
            class="empty-state">

            <p>Belum ada event mendatang</p>

            <button class="empty-btn">

                + Tambah Event

            </button>

        </div>

    </main>

    <!-- Floating Button -->
    <button class="floating-btn">

        <i class="fa-solid fa-plus"></i>

    </button>

    <!-- Modal -->
    <div
        id="deleteModal"
        class="modal">

        <div class="modal-content">

            <div class="modal-icon">

                <i class="fa-solid fa-trash"></i>

            </div>

            <h3>Hapus Event</h3>

            <p>Apakah Anda yakin ingin menghapus event ini?</p>

            <div class="modal-buttons">

                <button class="cancel-btn">

                    Batal

                </button>

                <button class="confirm-btn">

                    Hapus

                </button>

            </div>

        </div>

    </div>

    <nav class="bottom-nav">

    <a href="dashboard.html" class="nav-item">
        <i class="fa-solid fa-house"></i>
        <span>Beranda</span>
    </a>

    <a href="tasklist.html" class="nav-item">
        <i class="fa-regular fa-square-check"></i>
        <span>Tugas</span>
    </a>

    <a href="calendar.html" class="nav-item active">
        <i class="fa-regular fa-calendar"></i>
        <span>Kalender</span>
    </a>

    <a href="profil.html" class="nav-item">
        <i class="fa-regular fa-user"></i>
        <span>Profil</span>
    </a>

</nav>

</div>

<script src="../js/calendar.js"></script>

</body>

</html>
